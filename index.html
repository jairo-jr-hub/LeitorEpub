<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta id="theme-color-meta" name="theme-color" content="#f9f1e2">
    <title>Meu Leitor EPUB</title>
    
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>

    <div id="library-view">
        <header>
            <h1>Minha Biblioteca</h1>
            <label class="upload-btn">
                Adicionar EPUB
                <input type="file" id="file-input" accept=".epub" style="display: none;" />
            </label>
        </header>
        <main id="bookshelf"></main>
    </div>

    <div id="reader-view" class="ui-visible" style="display: none;">
        
        <div id="top-bar" class="floating-bar">
            <button id="btn-back" class="icon-btn">✕</button>
            <div style="display: flex; gap: 5px;">
                <button id="btn-toc" class="icon-btn" style="font-weight: bold; font-size: 22px;">☰</button>
                <button id="btn-aa" class="icon-btn font-weight-bold">Aa</button>
            </div>
        </div>

        <div id="toc-modal" class="hidden">
            <h2 style="margin-bottom: 15px; font-size: 20px;">Sumário</h2>
            <ul id="toc-list"></ul>
        </div>

        <div id="settings-modal" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" data-tab="texto">Texto</button>
                <button class="tab-btn" data-tab="iluminacao">Iluminação</button>
            </div>
            
            <div id="tab-texto" class="tab-content active">
                <div class="font-carousel">
                    <button class="font-btn" data-font="Original"><div class="circle">O</div><span>Original</span></button>
                    <button class="font-btn selected" data-font="'Literata', serif"><div class="circle literata-circle">L</div><span>Literata</span></button>
                    <button class="font-btn" data-font="Helvetica, sans-serif"><div class="circle">A</div><span>Helvetica</span></button>
                    <button class="font-btn" data-font="Georgia, serif"><div class="circle">A</div><span>Georgia</span></button>
                </div>
                
                <div class="controls-row">
                    <div class="btn-group">
                        <button id="btn-font-minus">T-</button>
                        <span id="font-size-display">100%</span>
                        <button id="btn-font-plus">T+</button>
                    </div>
                </div>
            </div>

            <div id="tab-iluminacao" class="tab-content">
                <div class="brightness-row">
                    <span>🔅</span>
                    <input type="range" id="brightness-slider" min="20" max="100" value="100">
                    <span>🔆</span>
                </div>
                <div class="theme-carousel">
                    <button class="theme-color-btn light" data-theme="light"></button>
                    <button class="theme-color-btn sepia selected" data-theme="sepia"></button>
                    <button class="theme-color-btn dark" data-theme="dark"></button>
                </div>
            </div>
        </div>
        
        <div id="viewer"></div>
        <div id="brightness-overlay"></div>

        <div id="bottom-bar" class="floating-bar">
            <button class="icon-btn">📑</button>
            <input type="range" id="progress-slider" min="0" max="100" value="0">
            <span id="page-info">-- %</span>
        </div>

        <div id="touch-zones">
            <div id="zone-left"></div>
            <div id="zone-center"></div>
            <div id="zone-right"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
