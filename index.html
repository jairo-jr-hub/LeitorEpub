<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leitor Minimalista</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        /* RESET E FONTES */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* TELA DE UPLOAD */
        #upload-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; padding: 20px; text-align: center;
        }
        .upload-btn {
            background-color: #007aff; color: white; padding: 16px 32px;
            border-radius: 30px; font-size: 18px; font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            display: flex; align-items: center; gap: 8px;
        }
        input[type="file"] { display: none; }

        /* TELA DO LEITOR */
        #reader-screen {
            display: none; height: 100vh; width: 100vw; position: relative;
        }

        #viewer-container {
            width: 100%; height: 100%;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            /* A margem horizontal é controlada via JavaScript aqui */
            transition: padding 0.3s ease; 
        }

        #viewer { width: 100%; height: 100%; }

        /* BOTÃO FLUTUANTE (Três Pontinhos) */
        #btn-menu {
            position: fixed;
            top: max(15px, env(safe-area-inset-top));
            right: 15px;
            width: 40px; height: 40px;
            border-radius: 50%; border: none;
            background: rgba(150, 150, 150, 0.15); /* Vidro translúcido */
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: inherit;
            display: flex; align-items: center; justify-content: center;
            z-index: 50; cursor: pointer;
            transition: opacity 0.3s;
        }
        
        /* Some com o botão quando os menus estão abertos */
        body.menu-open #btn-menu { opacity: 0; pointer-events: none; }

        /* MENU DE CONFIGURAÇÕES (Estilo Bottom Sheet iOS) */
        #backdrop {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4); z-index: 90;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        body.menu-open #backdrop { opacity: 1; pointer-events: auto; }

        #settings-sheet {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #ffffff;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }
        body.menu-open #settings-sheet { transform: translateY(0); }

        /* Detalhe da barrinha no topo do menu */
        .sheet-handle { width: 40px; height: 5px; background: #ddd; border-radius: 3px; margin: 0 auto 20px; }

        /* Controles dentro do menu */
        .control-group {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px;
        }
        .control-label { font-size: 16px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px;}
        .control-actions { display: flex; gap: 15px; }

        .btn-action {
            background: #f0f0f5; border: none; color: #333;
            width: 45px; height: 45px; border-radius: 50%;
            font-size: 18px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Temas Dinâmicos no Menu */
        body.theme-dark #settings-sheet { background: #2c2c2e; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        body.theme-dark .control-label { color: #fff; }
        body.theme-dark .btn-action { background: #3a3a3c; color: #fff; }
        
        body.theme-sepia #settings-sheet { background: #f4ecd8; }
        body.theme-sepia .control-label { color: #5b4636; }
        body.theme-sepia .btn-action { background: #eaddc5; color: #5b4636; }

        .theme-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; }
        .theme-btn.active { border-color: #007aff; transform: scale(1.1); }

        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 25px;
            border-radius: 12px; display: none; z-index: 200; font-weight: 500;
        }
    </style>
</head>
<body class="theme-light">

    <div id="loading">Preparando livro...</div>

    <div id="upload-screen">
        <label for="epub-upload" class="upload-btn">
            <span class="material-symbols-outlined">auto_stories</span>
            Abrir Livro
        </label>
        <input type="file" id="epub-upload" accept=".epub">
    </div>

    <div id="reader-screen">
        <button id="btn-menu">
            <span class="material-symbols-outlined">more_vert</span>
        </button>

        <div id="viewer-container">
            <div id="viewer"></div>
        </div>
    </div>

    <div id="backdrop"></div>
    <div id="settings-sheet">
        <div class="sheet-handle"></div>
        
        <div class="control-group">
            <div class="control-label"><span class="material-symbols-outlined">format_size</span> Fonte</div>
            <div class="control-actions">
                <button class="btn-action" id="btn-font-minus">A-</button>
                <button class="btn-action" id="btn-font-plus">A+</button>
            </div>
        </div>

        <div class="control-group">
            <div class="control-label"><span class="material-symbols-outlined">format_indent_increase</span> Margem</div>
            <div class="control-actions">
                <button class="btn-action" id="btn-margin-minus">❮❯</button>
                <button class="btn-action" id="btn-margin-plus">❯❮</button>
            </div>
        </div>

        <div class="control-group" style="margin-bottom: 0;">
            <div class="control-label"><span class="material-symbols-outlined">palette</span> Fundo</div>
            <div class="control-actions">
                <button class="theme-btn" style="background: #ffffff; border-color: #ccc;" onclick="setTheme(0)"></button>
                <button class="theme-btn" style="background: #f4ecd8;" onclick="setTheme(1)"></button>
                <button class="theme-btn" style="background: #121212;" onclick="setTheme(2)"></button>
            </div>
        </div>
    </div>

    <script>
        let book = null;
        let rendition = null;
        let bookKey = ''; 
        
        // Configurações Padrão
        let currentFontSize = 100;
        let currentMargin = 20; // Margem lateral em pixels
        let currentThemeIndex = 0;

        const themes = [
            { id: "light", bg: "#ffffff", text: "#333333", name: "theme-light" },
            { id: "sepia", bg: "#f4ecd8", text: "#5b4636", name: "theme-sepia" },
            { id: "dark", bg: "#121212", text: "#a9a9b3", name: "theme-dark" } // Texto mais suave no modo escuro
        ];

        // Elementos da DOM
        const loading = document.getElementById('loading');
        const viewerContainer = document.getElementById('viewer-container');
        const btnMenu = document.getElementById('btn-menu');
        const backdrop = document.getElementById('backdrop');

        // ABRE/FECHA MENU
        btnMenu.addEventListener('click', () => document.body.classList.add('menu-open'));
        backdrop.addEventListener('click', () => document.body.classList.remove('menu-open'));

        // 1. CARREGAR LIVRO
        document.getElementById('epub-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            loading.style.display = 'block';
            const reader = new FileReader();
            
            reader.onload = function(event) {
                bookKey = 'epub-' + file.name.replace(/[^a-zA-Z0-9]/g, ''); 
                iniciarLeitor(event.target.result);
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. INICIAR LEITOR
        function iniciarLeitor(bookData) {
            document.getElementById('upload-screen').style.display = 'none';
            document.getElementById('reader-screen').style.display = 'block';

            book = ePub(bookData);

            rendition = book.renderTo("viewer", {
                width: "100%", height: "100%", spread: "none"
            });

            // Resgatar Configurações Salvas
            if(localStorage.getItem('epub-font')) currentFontSize = parseInt(localStorage.getItem('epub-font'));
            if(localStorage.getItem('epub-margin')) currentMargin = parseInt(localStorage.getItem('epub-margin'));
            if(localStorage.getItem('epub-theme')) currentThemeIndex = parseInt(localStorage.getItem('epub-theme'));

            // Aplicar Estilos Iniciais
            aplicarMargem();
            rendition.themes.fontSize(currentFontSize + "%");
            
            themes.forEach(t => rendition.themes.register(t.id, { "body": { "background": t.bg, "color": t.text } }));
            setTheme(currentThemeIndex);

            // Tentar abrir última página salva
            const savedPage = localStorage.getItem(bookKey);
            let displayPromise = savedPage ? rendition.display(savedPage) : rendition.display();

            displayPromise.then(() => {
                loading.style.display = 'none';
                configurarGestos();
            }).catch(() => {
                // Se falhar o marcador, abre na capa
                rendition.display().then(() => loading.style.display = 'none');
            });

            // Salvar página ao mudar
            rendition.on('relocated', location => {
                localStorage.setItem(bookKey, location.start.cfi);
            });
        }

        // 3. GESTOS: SWIPE (Arrastar) E TAP (Tocar)
        function configurarGestos() {
            let touchStartX = 0;
            let touchEndX = 0;

            // Detectar Arrasto
            rendition.on("touchstart", event => {
                touchStartX = event.changedTouches[0].screenX;
            });

            rendition.on("touchend", event => {
                touchEndX = event.changedTouches[0].screenX;
                const diff = touchEndX - touchStartX;
                
                if (diff < -40) rendition.next(); // Arrastou p/ Esquerda (Avança)
                if (diff > 40) rendition.prev();  // Arrastou p/ Direita (Volta)
            });

            // Detectar Toque Simples
            rendition.on("click", event => {
                // Se o menu estiver aberto, qualquer clique no livro apenas fecha o menu
                if (document.body.classList.contains('menu-open')) {
                    document.body.classList.remove('menu-open');
                    return;
                }

                const width = window.innerWidth;
                const x = event.clientX;
                
                if (x < width * 0.3) rendition.prev(); // Tocou na esquerda
                else if (x > width * 0.7) rendition.next(); // Tocou na direita
            });
        }

        // 4. FUNÇÕES DE CONFIGURAÇÃO DO MENU

        // Mudar Fonte
        document.getElementById('btn-font-plus').addEventListener('click', () => {
            if(currentFontSize < 250) {
                currentFontSize += 10;
                rendition.themes.fontSize(currentFontSize + "%");
                localStorage.setItem('epub-font', currentFontSize);
            }
        });
        document.getElementById('btn-font-minus').addEventListener('click', () => {
            if(currentFontSize > 60) {
                currentFontSize -= 10;
                rendition.themes.fontSize(currentFontSize + "%");
                localStorage.setItem('epub-font', currentFontSize);
            }
        });

        // Mudar Margem
        document.getElementById('btn-margin-plus').addEventListener('click', () => {
            if(currentMargin < 80) {
                currentMargin += 10;
                aplicarMargem();
            }
        });
        document.getElementById('btn-margin-minus').addEventListener('click', () => {
            if(currentMargin > 0) {
                currentMargin -= 10;
                aplicarMargem();
            }
        });

        function aplicarMargem() {
            viewerContainer.style.paddingLeft = currentMargin + 'px';
            viewerContainer.style.paddingRight = currentMargin + 'px';
            localStorage.setItem('epub-margin', currentMargin);
            // Atualiza o leitor para recalcular as páginas baseadas na nova largura
            if (rendition) rendition.resize();
        }

        // Mudar Tema
        window.setTheme = function(index) {
            currentThemeIndex = index;
            const tema = themes[index];
            
            // Muda o fundo do iframe e do HTML em volta
            if(rendition) rendition.themes.select(tema.id);
            
            // Troca a classe no body para mudar a cor do Menu e Fundo
            document.body.className = tema.name;
            
            localStorage.setItem('epub-theme', index);
        };
    </script>
</body>
</html>
