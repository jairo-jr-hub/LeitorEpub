<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meu Leitor EPUB</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>

    <div id="library-view">
        <header>
            <h1>Minha Biblioteca</h1>
            <label class="upload-btn">
                Adicionar EPUB
                <input type="file" id="file-input" accept=".epub" style="display: none;" />
            </label>
        </header>
        <main id="bookshelf">
            </main>
    </div>

    <div id="reader-view" style="display: none;">
        <nav id="reader-toolbar">
            <button id="btn-back">⬅ Voltar</button>
            <div class="controls">
                <button id="btn-theme">🌙 Tema</button>
                <button id="btn-font-minus">A-</button>
                <button id="btn-font-plus">A+</button>
                <button id="btn-margin">Margem</button>
            </div>
        </nav>
        
        <div id="viewer"></div>
        
        <div id="prev-zone" class="touch-zone"></div>
        <div id="next-zone" class="touch-zone"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
