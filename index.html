<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta id="theme-color-meta" name="theme-color" content="#fdfaf6">
    <title>Meu Leitor EPUB</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>

    <div id="library-view">
        <header>
            <h1>Minha Biblioteca</h1>
            <label class="upload-btn">
                Adicionar EPUB
                <input type="file" id="file-input" accept=".epub" style="display: none;" />
            </label>
        </header>
        <main id="bookshelf"></main>
    </div>

    <div id="reader-view" class="ui-visible" style="display: none;">
        
        <div id="top-bar" class="floating-bar">
            <button id="btn-back" class="icon-btn">✕</button>
            <button id="btn-aa" class="icon-btn font-weight-bold">Aa</button>
        </div>

        <div id="settings-modal" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" data-tab="texto">Texto</button>
                <button class="tab-btn" data-tab="iluminacao">Iluminação</button>
            </div>
            
            <div id="tab-texto" class="tab-content active scrollable">
                <div class="font-carousel">
                    <button class="font-btn" data-font="Original"><div class="circle">A</div><span>Original</span></button>
                    <button class="font-btn" data-font="Helvetica"><div class="circle">A</div><span>Helvetica</span></button>
                    <button class="font-btn" data-font="Verdana"><div class="circle">A</div><span>Verdana</span></button>
                    <button class="font-btn" data-font="Georgia"><div class="circle">A</div><span>Georgia</span></button>
                </div>
                
                <div class="controls-row">
                    <div class="btn-group">
                        <button id="btn-font-minus">T-</button>
                        <span id="font-size-display">100%</span>
                        <button id="btn-font-plus">T+</button>
                    </div>
                    <select id="text-align-select">
                        <option value="justify">Justificado</option>
                        <option value="left">Esquerda</option>
                    </select>
                </div>

                <hr class="divider">

                <p class="section-title">Espaçamentos</p>
                <div class="controls-row">
                    <div class="btn-group" title="Entrelinhas">
                        <button id="btn-line-minus">↕-</button>
                        <span id="line-height-display">1.5</span>
                        <button id="btn-line-plus">↕+</button>
                    </div>
                    <div class="btn-group" title="Entre Palavras">
                        <button id="btn-word-minus">↔-</button>
                        <span id="word-space-display">0px</span>
                        <button id="btn-word-plus">↔+</button>
                    </div>
                </div>

                <hr class="divider">

                <p class="section-title">Margens da Página</p>
                <div class="slider-group">
                    <label>Topo: <input type="range" id="margin-top" min="0" max="150" value="40"></label>
                    <label>Rodapé: <input type="range" id="margin-bottom" min="0" max="150" value="40"></label>
                    <label>Esquerda: <input type="range" id="margin-left" min="0" max="100" value="20"></label>
                    <label>Direita: <input type="range" id="margin-right" min="0" max="100" value="20"></label>
                </div>
            </div>

            <div id="tab-iluminacao" class="tab-content">
                <div class="brightness-row">
                    <span>🔅</span>
                    <input type="range" id="brightness-slider" min="20" max="100" value="100">
                    <span>🔆</span>
                </div>
                <div class="theme-carousel">
                    <button class="theme-color-btn light" data-theme="light"></button>
                    <button class="theme-color-btn sepia" data-theme="sepia"></button>
                    <button class="theme-color-btn dark" data-theme="dark"></button>
                </div>
            </div>
        </div>
        
        <div id="viewer"></div>
        <div id="brightness-overlay"></div>

        <div id="bottom-bar" class="floating-bar">
            <button class="icon-btn">📑</button>
            <input type="range" id="progress-slider" min="0" max="100" value="0">
            <span id="page-info">-- %</span>
        </div>

        <div id="touch-zones">
            <div id="zone-left"></div>
            <div id="zone-center"></div>
            <div id="zone-right"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
