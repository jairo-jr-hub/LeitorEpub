    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ==================== DOM ELEMENTS ====================
            const uploadScreen = document.getElementById('uploadScreen');
            const readerScreen = document.getElementById('readerScreen');
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const btnUpload = document.getElementById('btnUpload');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const readingWrapper = document.getElementById('readingWrapper');
            const readingContent = document.getElementById('readingContent');
            const readingArea = document.getElementById('readingArea');
            const readerHeader = document.getElementById('readerHeader');
            const readerFooter = document.getElementById('readerFooter');
            const headerTitle = document.getElementById('headerTitle');
            const headerSubtitle = document.getElementById('headerSubtitle');
            const pageInfo = document.getElementById('pageInfo');
            const progressSlider = document.getElementById('progressSlider');
            const btnPrevPage = document.getElementById('btnPrevPage');
            const btnNextPage = document.getElementById('btnNextPage');
            const btnBack = document.getElementById('btnBack');
            const btnToc = document.getElementById('btnToc');
            const btnSettings = document.getElementById('btnSettings');
            const overlay = document.getElementById('overlay');
            const tocPanel = document.getElementById('tocPanel');
            const tocBody = document.getElementById('tocBody');
            const btnTocClose = document.getElementById('btnTocClose');
            const settingsPanel = document.getElementById('settingsPanel');
            const btnSettingsClose = document.getElementById('btnSettingsClose');
            const btnResetBook = document.getElementById('btnResetBook');
            const toast = document.getElementById('toast');

            // Settings DOM
            const fontSizeDown = document.getElementById('fontSizeDown');
            const fontSizeUp = document.getElementById('fontSizeUp');
            const fontSizeValue = document.getElementById('fontSizeValue');
            const fontFamily = document.getElementById('fontFamily');
            const lineHeightSlider = document.getElementById('lineHeightSlider');
            const lineHeightValue = document.getElementById('lineHeightValue');
            const marginSlider = document.getElementById('marginSlider');
            const marginValue = document.getElementById('marginValue');
            const textAlign = document.getElementById('textAlign');
            const themeOptions = document.querySelectorAll('.theme-option');

            // ==================== STATE ====================
            let bookData = null; // ArrayBuffer do EPUB
            let bookZip = null; // Instância JSZip
            let bookMetadata = { title: 'Sem título', author: 'Desconhecido' };
            let spineItems = []; // Array de {id, href, label}
            let tocItems = []; // Array de {label, href, chapterIndex}
            let resourceMap = {}; // Mapa: caminho normalizado -> Blob
            let resourceUrlMap = {}; // Mapa: caminho normalizado -> blob URL
            let currentChapterIndex = 0;
            let currentPageIndex = 0;
            let totalPagesInChapter = 1;
            let globalTotalPages = 1; // Estimativa total de páginas do livro
            let chapterPageCounts = []; // Array: número de páginas por capítulo
            let isUIVisible = true;
            let uiTimeout = null;

            // Settings
            let settings = {
                fontSize: 16,
                fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
                lineHeight: 1.6,
                theme: 'light',
                margin: 20,
                textAlign: 'justify',
            };

            // ==================== INDEXEDDB ====================
            const DB_NAME = 'epub-reader-db';
            const DB_VERSION = 1;
            const STORE_NAME = 'books';
            const BOOK_KEY = 'current-book';

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async function saveBookToDB(arrayBuffer, meta, spine, toc, chapterIdx, pageIdx, sets) {
                try {
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    await new Promise((res, rej) => {
                        const req = store.put({
                            id: BOOK_KEY,
                            data: arrayBuffer,
                            metadata: meta,
                            spineItems: spine,
                            tocItems: toc,
                            currentChapterIndex: chapterIdx,
                            currentPageIndex: pageIdx,
                            settings: sets,
                            timestamp: Date.now(),
                        });
                        req.onsuccess = res;
                        req.onerror = rej;
                    });
                    await new Promise(r => tx.oncomplete = r);
                    db.close();
                } catch (e) {
                    console.warn('Erro ao salvar no IndexedDB:', e);
                }
            }

            async function loadBookFromDB() {
                try {
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const result = await new Promise((res, rej) => {
                        const req = store.get(BOOK_KEY);
                        req.onsuccess = () => res(req.result);
                        req.onerror = rej;
                    });
                    db.close();
                    return result || null;
                } catch (e) {
                    console.warn('Erro ao carregar do IndexedDB:', e);
                    return null;
                }
            }

            async function clearBookFromDB() {
                try {
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.delete(BOOK_KEY);
                    await new Promise(r => tx.oncomplete = r);
                    db.close();
                } catch (e) { /* ignore */ }
            }

            async function saveProgressOnly(chapterIdx, pageIdx) {
                try {
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const existing = await new Promise((res, rej) => {
                        const req = store.get(BOOK_KEY);
                        req.onsuccess = () => res(req.result);
                        req.onerror = rej;
                    });
                    if (existing) {
                        existing.currentChapterIndex = chapterIdx;
                        existing.currentPageIndex = pageIdx;
                        existing.timestamp = Date.now();
                        store.put(existing);
                    }
                    await new Promise(r => tx.oncomplete = r);
                    db.close();
                } catch (e) { /* ignore */ }
            }

            // ==================== UTILITÁRIOS ====================
            function normalizePath(path) {
                return path.replace(/\/+/g, '/').replace(/^\//, '').replace(/\/$/, '');
            }

            function resolveRelativePath(basePath, relativePath) {
                if (!relativePath) return basePath;
                if (relativePath.startsWith('/')) return normalizePath(relativePath);
                const baseParts = normalizePath(basePath).split('/');
                baseParts.pop(); // Remove o nome do arquivo
                const parts = [...baseParts, ...relativePath.split('/')];
                const resolved = [];
                for (const part of parts) {
                    if (part === '..') resolved.pop();
                    else if (part !== '.' && part !== '') resolved.push(part);
                }
                return resolved.join('/');
            }

            function sanitizeHTML(html) {
                return html
                    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
                    .replace(/\son\w+\s*=\s*["'][^"']*["']/gi, '')
                    .replace(/\son\w+\s*=\s*[^\s>]*/gi, '');
            }

            function showToast(msg, duration = 2000) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), duration);
            }

            // ==================== PROCESSAMENTO EPUB ====================
            async function processEpub(arrayBuffer) {
                const zip = await JSZip.loadAsync(arrayBuffer);
                bookZip = zip;
                bookData = arrayBuffer;

                // Construir mapa de recursos
                resourceMap = {};
                resourceUrlMap = {};
                const allFiles = [];
                zip.forEach((relativePath, file) => {
                    if (!file.dir) {
                        allFiles.push({ path: normalizePath(relativePath), file });
                    }
                });

                // Criar blobs e URLs para todos os arquivos
                for (const { path, file } of allFiles) {
                    const blob = await file.async('blob');
                    resourceMap[path] = blob;
                    // Criar blob URL sob demanda para economizar memória
                }

                // Encontrar container.xml
                const containerPath = 'META-INF/container.xml';
                if (!resourceMap[containerPath]) {
                    throw new Error('EPUB inválido: container.xml não encontrado.');
                }

                const containerXml = await resourceMap[containerPath].text();
                const parser = new DOMParser();
                const containerDoc = parser.parseFromString(containerXml, 'text/xml');
                const rootfile = containerDoc.querySelector('rootfile[full-path]');
                if (!rootfile) {
                    throw new Error('EPUB inválido: rootfile não encontrado no container.xml.');
                }
                const opfPath = normalizePath(rootfile.getAttribute('full-path'));

                // Encontrar OPF
                if (!resourceMap[opfPath]) {
                    throw new Error(`Arquivo OPF não encontrado: ${opfPath}`);
                }
                const opfXml = await resourceMap[opfPath].text();
                const opfDoc = parser.parseFromString(opfXml, 'text/xml');

                // Extrair metadados
                const titleEl = opfDoc.querySelector('metadata > dc\\:title, metadata > title');
                const authorEl = opfDoc.querySelector('metadata > dc\\:creator, metadata > creator');
                bookMetadata = {
                    title: titleEl?.textContent?.trim() || 'Sem título',
                    author: authorEl?.textContent?.trim() || 'Desconhecido',
                };

                // Manifest
                const manifestItems = {};
                const manifestEls = opfDoc.querySelectorAll('manifest > item');
                manifestEls.forEach(item => {
                    const id = item.getAttribute('id');
                    const href = item.getAttribute('href');
                    const mediaType = item.getAttribute('media-type') || '';
                    if (id && href) {
                        manifestItems[id] = {
                            href: normalizePath(resolveRelativePath(opfPath, href)),
                            mediaType,
                        };
                    }
                });

                // Spine (ordem de leitura)
                const spineEls = opfDoc.querySelectorAll('spine > itemref');
                spineItems = [];
                spineEls.forEach(itemref => {
                    const idref = itemref.getAttribute('idref');
                    if (idref && manifestItems[idref]) {
                        const resolvedHref = manifestItems[idref].href;
                        spineItems.push({
                            id: idref,
                            href: resolvedHref,
                            label: null,
                        });
                    }
                });

                // Tentar parsear NCX para TOC
                const spineTocId = opfDoc.querySelector('spine')?.getAttribute('toc');
                let ncxPath = null;
                if (spineTocId && manifestItems[spineTocId]) {
                    ncxPath = manifestItems[spineTocId].href;
                } else {
                    // Procurar por NCX no manifest
                    for (const [id, item] of Object.entries(manifestItems)) {
                        if (item.mediaType === 'application/x-dtbncx+xml' || item.href.endsWith('.ncx')) {
                            ncxPath = item.href;
                            break;
                        }
                    }
                }

                tocItems = [];
                if (ncxPath && resourceMap[ncxPath]) {
                    try {
                        const ncxXml = await resourceMap[ncxPath].text();
                        const ncxDoc = parser.parseFromString(ncxXml, 'text/xml');
                        const navPoints = ncxDoc.querySelectorAll('navPoint');
                        navPoints.forEach(np => {
                            const label = np.querySelector('navLabel > text')?.textContent?.trim() || 'Sem título';
                            const contentSrc = np.querySelector('content')?.getAttribute('src');
                            if (contentSrc) {
                                const resolvedSrc = normalizePath(resolveRelativePath(ncxPath,
                                    contentSrc.split('#')[0]));
                                const chapterIdx = spineItems.findIndex(s => s.href === resolvedSrc);
                                tocItems.push({
                                    label,
                                    href: resolvedSrc,
                                    chapterIndex: chapterIdx >= 0 ? chapterIdx : null,
                                });
                            }
                        });
                    } catch (e) {
                        console.warn('Erro ao parsear NCX:', e);
                    }
                }

                // Se não há TOC, criar a partir do spine
                if (tocItems.length === 0) {
                    spineItems.forEach((item, idx) => {
                        tocItems.push({
                            label: `Capítulo ${idx + 1}`,
                            href: item.href,
                            chapterIndex: idx,
                        });
                    });
                }

                // Tentar extrair títulos dos capítulos para o spine
                for (let i = 0; i < spineItems.length; i++) {
                    const item = spineItems[i];
                    if (resourceMap[item.href]) {
                        try {
                            const htmlText = await resourceMap[item.href].text();
                            const doc = parser.parseFromString(htmlText, 'text/html');
                            const h1 = doc.querySelector('h1, h2, h3, title');
                            if (h1) {
                                const t = h1.textContent.trim();
                                if (t && t.length < 120) {
                                    item.label = t;
                                    // Atualizar TOC se corresponder
                                    const tocEntry = tocItems.find(ti => ti.chapterIndex === i);
                                    if (tocEntry && tocEntry.label.startsWith('Capítulo')) {
                                        tocEntry.label = t;
                                    }
                                }
                            }
                        } catch (e) { /* ignore */ }
                    }
                }

                // Se ainda não tem labels no spine, usar numeração
                spineItems.forEach((item, i) => {
                    if (!item.label) item.label = `Capítulo ${i + 1}`;
                });

                // Mapear TOC items para chapterIndex
                tocItems.forEach(ti => {
                    if (ti.chapterIndex === null) {
                        const idx = spineItems.findIndex(s => s.href === ti.href);
                        ti.chapterIndex = idx >= 0 ? idx : 0;
                    }
                });

                // Criar blob URLs para recursos usados (imagens, CSS)
                for (const [path, blob] of Object.entries(resourceMap)) {
                    if (/\.(png|jpg|jpeg|gif|svg|webp|bmp|ico)$/i.test(path) ||
                        /\.(css)$/i.test(path) ||
                        /\.(otf|ttf|woff|woff2)$/i.test(path)) {
                        if (!resourceUrlMap[path]) {
                            resourceUrlMap[path] = URL.createObjectURL(blob);
                        }
                    }
                }

                return { success: true };
            }

            function getChapterHTML(chapterIndex) {
                if (chapterIndex < 0 || chapterIndex >= spineItems.length) return null;
                const href = spineItems[chapterIndex].href;
                return resourceMap[href] ? resourceMap[href].text() : null;
            }

            async function processChapterHTML(rawHtml, chapterPath) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHtml, 'text/html');
                if (!doc.body) return sanitizeHTML(rawHtml);

                // Coletar CSS de <link> tags
                let allCSS = '';
                const links = doc.querySelectorAll('link[rel="stylesheet"], link[type="text/css"]');
                for (const link of links) {
                    const href = link.getAttribute('href');
                    if (href) {
                        const resolvedCSSPath = resolveRelativePath(chapterPath, href);
                        if (resourceMap[resolvedCSSPath]) {
                            try {
                                const cssText = await resourceMap[resolvedCSSPath].text();
                                allCSS += '/* ' + resolvedCSSPath + ' */\n' + cssText + '\n';
                            } catch (e) { /* ignore */ }
                        }
                    }
                    link.remove();
                }

                // Substituir src em imagens
                const imgs = doc.querySelectorAll('img[src], image[href]');
                imgs.forEach(img => {
                    const srcAttr = img.tagName.toLowerCase() === 'image' ? 'href' : 'src';
                    const src = img.getAttribute(srcAttr);
                    if (src && !src.startsWith('data:') && !src.startsWith('http')) {
                        const resolved = resolveRelativePath(chapterPath, src);
                        if (resourceUrlMap[resolved]) {
                            img.setAttribute(srcAttr, resourceUrlMap[resolved]);
                        } else if (resourceMap[resolved]) {
                            const blobUrl = URL.createObjectURL(resourceMap[resolved]);
                            resourceUrlMap[resolved] = blobUrl;
                            img.setAttribute(srcAttr, blobUrl);
                        }
                    }
                });

                // Substituir href em elementos de imagem SVG
                const svgImages = doc.querySelectorAll('image[href]');
                svgImages.forEach(img => {
                    const href = img.getAttribute('href');
                    if (href && !href.startsWith('data:') && !href.startsWith('http')) {
                        const resolved = resolveRelativePath(chapterPath, href);
                        if (resourceUrlMap[resolved]) {
                            img.setAttribute('href', resourceUrlMap[resolved]);
                        }
                    }
                });

                // Processar url() em CSS inline
                const elementsWithStyle = doc.querySelectorAll('[style]');
                elementsWithStyle.forEach(el => {
                    let style = el.getAttribute('style');
                    style = style.replace(/url\(["']?([^"')]+)["']?\)/g, (match, url) => {
                        if (url.startsWith('data:') || url.startsWith('http')) return match;
                        const resolved = resolveRelativePath(chapterPath, url);
                        if (resourceUrlMap[resolved]) {
                            return `url(${resourceUrlMap[resolved]})`;
                        }
                        return match;
                    });
                    el.setAttribute('style', style);
                });

                // Construir HTML final
                let styleTag = '';
                if (allCSS) {
                    styleTag = `<style>${allCSS}</style>`;
                }
                const bodyHTML = doc.body.innerHTML;

                return sanitizeHTML(styleTag + bodyHTML);
            }

            // ==================== RENDERIZAÇÃO DO CAPÍTULO ====================
            async function loadAndRenderChapter(chapterIndex, targetPage = 0) {
                if (chapterIndex < 0 || chapterIndex >= spineItems.length) return;
                currentChapterIndex = chapterIndex;

                const rawHtml = await getChapterHTML(chapterIndex);
                if (!rawHtml) {
                    readingContent.innerHTML = '<p style="text-align:center;padding:40px;">Capítulo não encontrado.</p>';
                    return;
                }

                const chapterPath = spineItems[chapterIndex].href;
                const processedHTML = await processChapterHTML(rawHtml, chapterPath);

                // Inserir conteúdo
                readingContent.innerHTML = processedHTML;

                // Aguardar renderização
                await new Promise(r => setTimeout(r, 100));

                // Aplicar estilos de configuração
                applyContentStyles();

                // Calcular páginas
                recalcPages();

                // Ir para a página alvo
                if (targetPage >= totalPagesInChapter) targetPage = totalPagesInChapter - 1;
                if (targetPage < 0) targetPage = 0;
                currentPageIndex = targetPage;
                goToPage(currentPageIndex, false);

                // Atualizar UI
                updateUI();
                updateTOCActive();
                saveProgressDebounced();

                // Atualizar contagem de páginas do capítulo
                chapterPageCounts[chapterIndex] = totalPagesInChapter;
                updateGlobalPageEstimate();
            }

            function applyContentStyles() {
                const s = settings;
                readingContent.style.fontSize = s.fontSize + 'px';
                readingContent.style.fontFamily = s.fontFamily;
                readingContent.style.lineHeight = s.lineHeight;
                readingContent.style.textAlign = s.textAlign;
                readingContent.style.padding = `24px ${s.margin}px`;
            }

            function recalcPages() {
                const areaRect = readingArea.getBoundingClientRect();
                const pageWidth = areaRect.width;
                const pageHeight = areaRect.height;
                const margin = settings.margin;
                const columnWidth = pageWidth - (margin * 2);
                const columnGap = pageWidth < 500 ? 24 : 40;

                if (columnWidth < 200) {
                    totalPagesInChapter = 1;
                    readingContent.style.columnWidth = 'auto';
                    readingContent.style.columnGap = '0px';
                    readingContent.style.height = 'auto';
                    readingContent.style.padding = '16px';
                    readingWrapper.style.overflowX = 'hidden';
                    readingWrapper.style.overflowY = 'auto';
                    return;
                }

                readingContent.style.columnWidth = columnWidth + 'px';
                readingContent.style.columnGap = columnGap + 'px';
                readingContent.style.height = pageHeight + 'px';
                readingContent.style.padding = `24px ${margin}px`;
                readingWrapper.style.overflowX = 'auto';
                readingWrapper.style.overflowY = 'hidden';

                // Forçar reflow
                readingContent.offsetHeight;

                const totalScrollWidth = readingContent.scrollWidth;
                const effectivePageWidth = columnWidth + columnGap;
                totalPagesInChapter = Math.max(1, Math.ceil(totalScrollWidth / effectivePageWidth));

                // Armazenar para uso na navegação
                readingContent._columnWidth = columnWidth;
                readingContent._columnGap = columnGap;
                readingContent._effectivePageWidth = effectivePageWidth;
            }

            function goToPage(pageIndex, animate = true) {
                if (pageIndex < 0) pageIndex = 0;
                if (pageIndex >= totalPagesInChapter) pageIndex = totalPagesInChapter - 1;
                currentPageIndex = pageIndex;

                const effectiveWidth = readingContent._effectivePageWidth || (
                    (readingContent._columnWidth || 300) + (readingContent._columnGap || 40)
                );
                const targetScroll = pageIndex * effectiveWidth;

                if (animate) {
                    readingWrapper.scrollTo({ left: targetScroll, behavior: 'smooth' });
                } else {
                    readingWrapper.scrollLeft = targetScroll;
                }

                updateUI();
                saveProgressDebounced();
            }

            function goToNextPage() {
                if (currentPageIndex < totalPagesInChapter - 1) {
                    goToPage(currentPageIndex + 1);
                } else {
                    // Próximo capítulo
                    if (currentChapterIndex < spineItems.length - 1) {
                        loadAndRenderChapter(currentChapterIndex + 1, 0).then(() => {
                            showToast(spineItems[currentChapterIndex]?.label || 'Próximo capítulo');
                        });
                    } else {
                        showToast('Fim do livro');
                    }
                }
            }

            function goToPrevPage() {
                if (currentPageIndex > 0) {
                    goToPage(currentPageIndex - 1);
                } else {
                    // Capítulo anterior
                    if (currentChapterIndex > 0) {
                        const prevIdx = currentChapterIndex - 1;
                        // Ir para a última página do capítulo anterior
                        const prevPages = chapterPageCounts[prevIdx] || 1;
                        loadAndRenderChapter(prevIdx, prevPages - 1).then(() => {
                            showToast(spineItems[prevIdx]?.label || 'Capítulo anterior');
                        });
                    } else {
                        showToast('Início do livro');
                    }
                }
            }

            function updateGlobalPageEstimate() {
                let total = 0;
                for (let i = 0; i < spineItems.length; i++) {
                    total += chapterPageCounts[i] || 1;
                }
                globalTotalPages = Math.max(1, total);
                updateProgressSlider();
            }

            function getGlobalPageNumber() {
                let pageSum = 0;
                for (let i = 0; i < currentChapterIndex; i++) {
                    pageSum += chapterPageCounts[i] || 1;
                }
                return pageSum + currentPageIndex;
            }

            function updateProgressSlider() {
                const globalPage = getGlobalPageNumber();
                progressSlider.max = Math.max(1, globalTotalPages - 1);
                progressSlider.value = Math.min(globalPage, globalTotalPages - 1);
            }

            function updateUI() {
                pageInfo.textContent = `${currentPageIndex + 1} / ${totalPagesInChapter}`;
                headerTitle.textContent = bookMetadata.title;
                headerSubtitle.textContent = spineItems[currentChapterIndex]?.label || '';
                updateProgressSlider();
                btnPrevPage.disabled = (currentChapterIndex === 0 && currentPageIndex === 0);
                btnNextPage.disabled = (currentChapterIndex === spineItems.length - 1 &&
                    currentPageIndex >= totalPagesInChapter - 1);
            }

            function updateTOCActive() {
                const items = tocBody.querySelectorAll('.toc-item');
                items.forEach((el, i) => {
                    el.classList.toggle('active', tocItems[i]?.chapterIndex === currentChapterIndex);
                });
            }

            // ==================== UI CONTROLS ====================
            function toggleUI() {
                isUIVisible = !isUIVisible;
                if (isUIVisible) {
                    readerHeader.classList.remove('hidden-ui');
                    readerFooter.classList.remove('hidden-ui');
                } else {
                    readerHeader.classList.add('hidden-ui');
                    readerFooter.classList.add('hidden-ui');
                }
                resetUITimer();
            }

            function resetUITimer() {
                clearTimeout(uiTimeout);
                if (isUIVisible) {
                    uiTimeout = setTimeout(() => {
                        if (isUIVisible && !overlay.classList.contains('open')) {
                            toggleUI();
                        }
                    }, 4000);
                }
            }

            function openPanel(panel) {
                panel.classList.add('open');
                overlay.classList.add('open');
                clearTimeout(uiTimeout);
            }

            function closeAllPanels() {
                tocPanel.classList.remove('open');
                settingsPanel.classList.remove('open');
                overlay.classList.remove('open');
                resetUITimer();
            }

            function buildTOCUI() {
                tocBody.innerHTML = '';
                if (tocItems.length === 0) {
                    tocBody.innerHTML =
                        '<p style="color:#999;text-align:center;padding:20px;">Nenhum índice disponível</p>';
                    return;
                }
                tocItems.forEach((item, i) => {
                    const div = document.createElement('div');
                    div.className = 'toc-item';
                    if (item.chapterIndex === currentChapterIndex) div.classList.add('active');
                    div.innerHTML = `
                <span class="toc-label">${item.label}</span>
                <span class="toc-page">${item.chapterIndex !== null ? 'Cap. ' + (item.chapterIndex + 1) : ''}</span>
              `;
                    div.addEventListener('click', () => {
                        if (item.chapterIndex !== null && item.chapterIndex !== undefined) {
                            closeAllPanels();
                            loadAndRenderChapter(item.chapterIndex, 0);
                            showToast(item.label);
                        }
                    });
                    tocBody.appendChild(div);
                });
            }

            // ==================== SETTINGS ====================
            function applyTheme(theme) {
                settings.theme = theme;
                readerScreen.className = 'screen theme-' + theme;
                document.querySelectorAll('.theme-option').forEach(opt => {
                    opt.classList.toggle('active', opt.dataset.theme === theme);
                });
                saveSettingsToStorage();
                if (bookData) {
                    saveBookToDB(bookData, bookMetadata, spineItems, tocItems, currentChapterIndex,
                        currentPageIndex, settings);
                }
            }

            function applyAllSettings() {
                applyContentStyles();
                if (bookData && spineItems.length > 0) {
                    const savedPage = currentPageIndex;
                    recalcPages();
                    chapterPageCounts[currentChapterIndex] = totalPagesInChapter;
                    updateGlobalPageEstimate();
                    if (savedPage >= totalPagesInChapter) {
                        goToPage(totalPagesInChapter - 1, false);
                    } else {
                        goToPage(savedPage, false);
                    }
                    updateUI();
                }
                saveSettingsToStorage();
                if (bookData) {
                    saveBookToDB(bookData, bookMetadata, spineItems, tocItems, currentChapterIndex,
                        currentPageIndex, settings);
                }
            }

            function saveSettingsToStorage() {
                try {
                    localStorage.setItem('epub-reader-settings', JSON.stringify(settings));
                } catch (e) { /* ignore */ }
            }

            function loadSettingsFromStorage() {
                try {
                    const saved = localStorage.getItem('epub-reader-settings');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        settings = { ...settings, ...parsed };
                    }
                } catch (e) { /* ignore */ }
            }

            function updateSettingsUI() {
                fontSizeValue.textContent = settings.fontSize + 'px';
                fontFamily.value = settings.fontFamily;
                lineHeightSlider.value = Math.round(settings.lineHeight * 10);
                lineHeightValue.textContent = settings.lineHeight.toFixed(1);
                marginSlider.value = settings.margin;
                marginValue.textContent = settings.margin + 'px';
                textAlign.value = settings.textAlign;
                document.querySelectorAll('.theme-option').forEach(opt => {
                    opt.classList.toggle('active', opt.dataset.theme === settings.theme);
                });
                readerScreen.className = 'screen theme-' + settings.theme;
            }

            // ==================== PROGRESS SAVE (DEBOUNCE) ====================
            let saveTimeout = null;

            function saveProgressDebounced() {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    if (bookData && spineItems.length > 0) {
                        saveProgressOnly(currentChapterIndex, currentPageIndex);
                    }
                }, 500);
            }

            // ==================== EVENT LISTENERS ====================
            // Upload
            dropZone.addEventListener('click', () => fileInput.click());
            btnUpload.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileUpload(e.target.files[0]);
                }
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) {
                    handleFileUpload(e.dataTransfer.files[0]);
                }
            });

            async function handleFileUpload(file) {
                if (!file.name.toLowerCase().endsWith('.epub')) {
                    showToast('Por favor, selecione um arquivo EPUB.');
                    return;
                }
                loadingIndicator.classList.add('active');
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    await processEpub(arrayBuffer);
                    chapterPageCounts = new Array(spineItems.length).fill(1);
                    await loadAndRenderChapter(0, 0);
                    buildTOCUI();
                    updateSettingsUI();
                    applyTheme(settings.theme);
                    applyAllSettings();
                    uploadScreen.classList.add('hidden');
                    readerScreen.classList.remove('hidden');
                    isUIVisible = true;
                    readerHeader.classList.remove('hidden-ui');
                    readerFooter.classList.remove('hidden-ui');
                    resetUITimer();
                    // Salvar no IndexedDB
                    await saveBookToDB(arrayBuffer, bookMetadata, spineItems, tocItems, 0, 0, settings);
                    showToast('Livro carregado! 📖');
                } catch (err) {
                    console.error('Erro ao processar EPUB:', err);
                    showToast('Erro: ' + (err.message || 'Falha ao abrir o arquivo.'));
                } finally {
                    loadingIndicator.classList.remove('active');
                    fileInput.value = '';
                }
            }

            // Navegação
            btnPrevPage.addEventListener('click', (e) => {
                e.stopPropagation();
                goToPrevPage();
                resetUITimer();
            });
            btnNextPage.addEventListener('click', (e) => {
                e.stopPropagation();
                goToNextPage();
                resetUITimer();
            });

            // Progress slider
            progressSlider.addEventListener('input', () => {
                const targetGlobalPage = parseInt(progressSlider.value);
                // Encontrar capítulo e página correspondentes
                let pageSum = 0;
                for (let i = 0; i < spineItems.length; i++) {
                    const pages = chapterPageCounts[i] || 1;
                    if (targetGlobalPage < pageSum + pages) {
                        const targetPage = targetGlobalPage - pageSum;
                        if (i !== currentChapterIndex) {
                            loadAndRenderChapter(i, targetPage);
                        } else {
                            goToPage(targetPage);
                        }
                        break;
                    }
                    pageSum += pages;
                }
                resetUITimer();
            });

            // Toque na área de leitura
            readingArea.addEventListener('click', (e) => {
                if (e.target.closest('.nav-btn') || e.target.closest('input')) return;
                if (overlay.classList.contains('open')) {
                    closeAllPanels();
                    return;
                }
                toggleUI();
            });

            // Duplo toque para zoom (simplificado)
            readingArea.addEventListener('dblclick', (e) => {
                e.preventDefault();
                // Pode ser usado para zoom futuro
            });

            // Touch swipe para virar página
            let touchStartX = 0;
            let touchStartY = 0;
            let touchMoved = false;

            readingArea.addEventListener('touchstart', (e) => {
                if (e.target.closest('input') || e.target.closest('button') || e.target.closest('.panel'))
                    return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchMoved = false;
            }, { passive: true });

            readingArea.addEventListener('touchmove', (e) => {
                if (!touchStartX) return;
                const dx = e.touches[0].clientX - touchStartX;
                const dy = e.touches[0].clientY - touchStartY;
                if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                    touchMoved = true;
                }
            }, { passive: true });

            readingArea.addEventListener('touchend', (e) => {
                if (!touchMoved || !touchStartX) return;
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);

                if (absDx > absDy && absDx > 40) {
                    if (dx < -30) {
                        goToNextPage();
                    } else if (dx > 30) {
                        goToPrevPage();
                    }
                    resetUITimer();
                }
                touchStartX = 0;
                touchStartY = 0;
                touchMoved = false;
            });

            // Teclado
            document.addEventListener('keydown', (e) => {
                if (!bookData) return;
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
                switch (e.key) {
                    case 'ArrowRight':
                    case ' ':
                        e.preventDefault();
                        goToNextPage();
                        resetUITimer();
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        goToPrevPage();
                        resetUITimer();
                        break;
                    case 'Escape':
                        closeAllPanels();
                        break;
                }
            });

            // Redimensionamento
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (bookData && spineItems.length > 0) {
                        const savedPage = currentPageIndex;
                        recalcPages();
                        chapterPageCounts[currentChapterIndex] = totalPagesInChapter;
                        updateGlobalPageEstimate();
                        if (savedPage >= totalPagesInChapter) {
                            goToPage(totalPagesInChapter - 1, false);
                        } else {
                            goToPage(savedPage, false);
                        }
                        updateUI();
                    }
                }, 300);
            });

            // Mudança de orientação
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    if (bookData && spineItems.length > 0) {
                        const savedPage = currentPageIndex;
                        recalcPages();
                        chapterPageCounts[currentChapterIndex] = totalPagesInChapter;
                        updateGlobalPageEstimate();
                        if (savedPage >= totalPagesInChapter) {
                            goToPage(totalPagesInChapter - 1, false);
                        } else {
                            goToPage(savedPage, false);
                        }
                        updateUI();
                    }
                }, 400);
            });

            // Painéis
            btnToc.addEventListener('click', (e) => {
                e.stopPropagation();
                if (tocPanel.classList.contains('open')) {
                    closeAllPanels();
                } else {
                    closeAllPanels();
                    buildTOCUI();
                    openPanel(tocPanel);
                }
            });
            btnSettings.addEventListener('click', (e) => {
                e.stopPropagation();
                if (settingsPanel.classList.contains('open')) {
                    closeAllPanels();
                } else {
                    closeAllPanels();
                    updateSettingsUI();
                    openPanel(settingsPanel);
                }
            });
            btnTocClose.addEventListener('click', closeAllPanels);
            btnSettingsClose.addEventListener('click', closeAllPanels);
            overlay.addEventListener('click', closeAllPanels);

            // Botão voltar
            btnBack.addEventListener('click', () => {
                closeAllPanels();
                clearBookFromDB().then(() => {
                    cleanupResources();
                    bookData = null;
                    bookZip = null;
                    spineItems = [];
                    tocItems = [];
                    currentChapterIndex = 0;
                    currentPageIndex = 0;
                    readingContent.innerHTML = '';
                    uploadScreen.classList.remove('hidden');
                    readerScreen.classList.add('hidden');
                    isUIVisible = true;
                    readerHeader.classList.remove('hidden-ui');
                    readerFooter.classList.remove('hidden-ui');
                });
            });

            // Reset book
            btnResetBook.addEventListener('click', () => {
                closeAllPanels();
                clearBookFromDB().then(() => {
                    cleanupResources();
                    bookData = null;
                    bookZip = null;
                    spineItems = [];
                    tocItems = [];
                    currentChapterIndex = 0;
                    currentPageIndex = 0;
                    readingContent.innerHTML = '';
                    uploadScreen.classList.remove('hidden');
                    readerScreen.classList.add('hidden');
                    isUIVisible = true;
                    readerHeader.classList.remove('hidden-ui');
                    readerFooter.classList.remove('hidden-ui');
                });
            });

            function cleanupResources() {
                for (const url of Object.values(resourceUrlMap)) {
                    try { URL.revokeObjectURL(url); } catch (e) { /* ignore */ }
                }
                resourceUrlMap = {};
                resourceMap = {};
            }

            // Settings listeners
            fontSizeDown.addEventListener('click', () => {
                if (settings.fontSize > 10) {
                    settings.fontSize = Math.max(10, settings.fontSize - 1);
                    fontSizeValue.textContent = settings.fontSize + 'px';
                    applyAllSettings();
                }
            });
            fontSizeUp.addEventListener('click', () => {
                if (settings.fontSize < 32) {
                    settings.fontSize = Math.min(32, settings.fontSize + 1);
                    fontSizeValue.textContent = settings.fontSize + 'px';
                    applyAllSettings();
                }
            });
            fontFamily.addEventListener('change', () => {
                settings.fontFamily = fontFamily.value;
                applyAllSettings();
            });
            lineHeightSlider.addEventListener('input', () => {
                settings.lineHeight = parseInt(lineHeightSlider.value) / 10;
                lineHeightValue.textContent = settings.lineHeight.toFixed(1);
                applyAllSettings();
            });
            marginSlider.addEventListener('input', () => {
                settings.margin = parseInt(marginSlider.value);
                marginValue.textContent = settings.margin + 'px';
                applyAllSettings();
            });
            textAlign.addEventListener('change', () => {
                settings.textAlign = textAlign.value;
                applyAllSettings();
            });
            themeOptions.forEach(opt => {
                opt.addEventListener('click', () => {
                    applyTheme(opt.dataset.theme);
                });
            });

            // Scroll na área de leitura (para detectar mudança de página por scroll manual)
            readingWrapper.addEventListener('scroll', () => {
                if (!bookData) return;
                const effectiveWidth = readingContent._effectivePageWidth || 350;
                const scrollLeft = readingWrapper.scrollLeft;
                const newPage = Math.round(scrollLeft / effectiveWidth);
                if (newPage !== currentPageIndex && newPage >= 0 && newPage < totalPagesInChapter) {
                    currentPageIndex = newPage;
                    updateUI();
                    saveProgressDebounced();
                }
            }, { passive: true });

            // ==================== INICIALIZAÇÃO ====================
            async function init() {
                loadSettingsFromStorage();
                updateSettingsUI();
                applyTheme(settings.theme);

                // Tentar carregar livro salvo
                const saved = await loadBookFromDB();
                if (saved && saved.data && saved.spineItems && saved.spineItems.length > 0) {
                    try {
                        loadingIndicator.classList.add('active');
                        bookData = saved.data;
                        bookMetadata = saved.metadata || bookMetadata;
                        spineItems = saved.spineItems || [];
                        tocItems = saved.tocItems || [];
                        if (saved.settings) {
                            settings = { ...settings, ...saved.settings };
                            updateSettingsUI();
                            applyTheme(settings.theme);
                        }
                        await processEpub(bookData);
                        chapterPageCounts = new Array(spineItems.length).fill(1);
                        const startChapter = Math.min(saved.currentChapterIndex || 0, spineItems.length - 1);
                        await loadAndRenderChapter(startChapter, saved.currentPageIndex || 0);
                        buildTOCUI();
                        updateSettingsUI();
                        applyAllSettings();
                        uploadScreen.classList.add('hidden');
                        readerScreen.classList.remove('hidden');
                        isUIVisible = true;
                        readerHeader.classList.remove('hidden-ui');
                        readerFooter.classList.remove('hidden-ui');
                        resetUITimer();
                        showToast('Livro restaurado! 📖');
                    } catch (e) {
                        console.error('Erro ao restaurar livro:', e);
                        await clearBookFromDB();
                        cleanupResources();
                        bookData = null;
                    } finally {
                        loadingIndicator.classList.remove('active');
                    }
                }
            }

            init();

            console.log('📚 Leitor EPUB pronto!');
            console.log('   - Arraste um arquivo .epub para começar');
            console.log('   - Toque no centro da tela para mostrar/esconder controles');
            console.log('   - Swipe horizontal para virar páginas');
            console.log('   - Setas do teclado também funcionam');
            console.log('   - Progresso salvo automaticamente');
        })();
    </script>
</body>
</html>
