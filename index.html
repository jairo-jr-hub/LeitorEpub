<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leitor EPUB - Versão 1</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body class="theme-sepia">

    <div id="startup-screen">
        <h1>Leitor EPUB</h1>
        <p class="subtitle">Versão 1.0 - Estilo Play Livros</p>
        <label for="book-upload" class="upload-btn">Escolher Livro (.epub)</label>
        <input type="file" id="book-upload" accept=".epub">
    </div>

    <div id="viewer" class="hidden"></div>

    <div id="top-bar" class="ui-bar hidden">
        <button id="btn-back">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <button id="btn-aa"><strong>Aa</strong></button>
    </div>

    <div id="bottom-bar" class="ui-bar hidden">
        <div class="progress-container">
            <button id="prev-page">‹</button>
            <span id="page-info">...</span>
            <button id="next-page">›</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="settings-header">
            <button id="tab-text" class="active">Texto</button>
            <button id="tab-light">Iluminação</button>
        </div>
        
        <div id="panel-text" class="settings-panel">
            <div class="font-selector">
                <button class="font-btn active" data-font="Literata" style="font-family: 'Literata', serif;">
                    <span class="font-icon">A</span>
                    <small>Literata</small>
                </button>
                <button class="font-btn" data-font="Helvetica" style="font-family: Helvetica, sans-serif;">
                    <span class="font-icon">A</span>
                    <small>Helvetica</small>
                </button>
                <button class="font-btn" data-font="Georgia" style="font-family: Georgia, serif;">
                    <span class="font-icon">A</span>
                    <small>Georgia</small>
                </button>
            </div>
            
            <div class="controls-row">
                <div class="size-selector">
                    <button id="btn-size-down">A-</button>
                    <span id="current-size">100%</span>
                    <button id="btn-size-up">A+</button>
                </div>
            </div>
        </div>

        <div id="panel-light" class="settings-panel hidden">
            <div class="theme-selector">
                <button class="theme-btn" data-theme="light" style="background: #FFFFFF; border: 1px solid #E0E0E0;"></button>
                <button class="theme-btn active" data-theme="sepia" style="background: #FDF7EC; border: 1px solid #D7CDBB;"></button>
                <button class="theme-btn" data-theme="dark" style="background: #121212; border: 1px solid #333333;"></button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
