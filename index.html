<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leitor EPUB Minimalista</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        /* RESET BÁSICO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #ffffff;
            color: #333333;
            overflow: hidden; /* Trava o scroll da página, o livro cuida disso */
        }

        /* TELA DE UPLOAD */
        #upload-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .upload-btn {
            background-color: #007aff;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);
        }

        input[type="file"] { display: none; }

        /* TELA DO LEITOR */
        #reader-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* O container do livro ocupa o máximo de espaço, deixando só a barra embaixo */
        #viewer-container {
            flex-grow: 1;
            width: 100%;
            padding-top: env(safe-area-inset-top); /* Respeita o entalhe do iPhone */
            overflow: hidden;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        /* BARRA DE CONTROLES INFERIOR (À prova do iOS) */
        #toolbar {
            height: 60px;
            background-color: #f8f8f8;
            border-top: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* Respeita a barra de home do iPhone */
        }

        .btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #007aff;
            padding: 10px;
            font-weight: bold;
        }

        .btn-page { font-size: 24px; padding: 10px 20px; }

        /* MENSAGEM DE CARREGAMENTO */
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading">Carregando livro...</div>

    <div id="upload-screen">
        <h2 style="margin-bottom: 20px;">Leitor EPUB</h2>
        <label for="epub-upload" class="upload-btn">Abrir Livro no Celular</label>
        <input type="file" id="epub-upload" accept=".epub">
    </div>

    <div id="reader-screen">
        
        <div id="viewer-container">
            <div id="viewer"></div>
        </div>

        <div id="toolbar">
            <button class="btn btn-page" id="btn-prev">❮</button>
            <button class="btn" id="btn-theme">Tema</button>
            <button class="btn" id="btn-font-minus">A-</button>
            <button class="btn" id="btn-font-plus">A+</button>
            <button class="btn btn-page" id="btn-next">❯</button>
        </div>

    </div>

    <script>
        // Variáveis globais do leitor
        let book = null;
        let rendition = null;
        let bookKey = ''; 
        let currentFontSize = 100;
        
        // Controle de Temas: 0 = Claro, 1 = Sépia, 2 = Escuro
        const themes = [
            { id: "light", bg: "#ffffff", text: "#333333" },
            { id: "sepia", bg: "#f4ecd8", text: "#5b4636" },
            { id: "dark", bg: "#121212", text: "#e0e0e0" }
        ];
        let currentThemeIndex = 0;

        // Elementos da Tela
        const uploadScreen = document.getElementById('upload-screen');
        const readerScreen = document.getElementById('reader-screen');
        const loading = document.getElementById('loading');
        const viewer = document.getElementById('viewer');

        // 1. CARREGAR O ARQUIVO EPUB
        document.getElementById('epub-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            loading.style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(event) {
                const bookData = event.target.result;
                // Usamos o nome do arquivo limpo como chave para salvar a página no navegador
                bookKey = 'epub-save-' + file.name.replace(/[^a-zA-Z0-9]/g, ''); 
                iniciarLeitor(bookData);
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. INICIAR O MOTOR DE LEITURA
        function iniciarLeitor(bookData) {
            // Troca as telas
            uploadScreen.style.display = 'none';
            readerScreen.style.display = 'flex';

            // Instancia o livro
            book = ePub(bookData);

            // Renderiza focado apenas em mobile (uma página por vez)
            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                spread: "none" // Garante que não tente forçar tela dupla
            });

            // Registrar os 3 temas na engine
            themes.forEach(t => {
                rendition.themes.register(t.id, { "body": { "background": t.bg, "color": t.text } });
            });

            // Resgata configurações anteriores (se houver)
            recuperarConfiguracoes();

            // Carrega a última página lida (ou a primeira se for a primeira vez)
            const savedPage = localStorage.getItem(bookKey);
            if (savedPage) {
                rendition.display(savedPage).then(() => { loading.style.display = 'none'; });
            } else {
                rendition.display().then(() => { loading.style.display = 'none'; });
            }

            // SALVAR PÁGINA AUTOMATICAMENTE
            // Toda vez que a página vira, atualizamos o localStorage
            rendition.on('relocated', function(location) {
                localStorage.setItem(bookKey, location.start.cfi);
            });
        }

        // 3. RECUPERAR TEMA E FONTE
        function recuperarConfiguracoes() {
            // Fonte
            const savedFont = localStorage.getItem('epub-font-size');
            if (savedFont) {
                currentFontSize = parseInt(savedFont);
                rendition.themes.fontSize(currentFontSize + "%");
            }

            // Tema
            const savedThemeIndex = localStorage.getItem('epub-theme-index');
            if (savedThemeIndex !== null) {
                currentThemeIndex = parseInt(savedThemeIndex);
            }
            aplicarTemaAtual();
        }

        // 4. CONTROLES DA BARRA INFERIOR
        
        // Passar Páginas
        document.getElementById('btn-prev').addEventListener('click', () => {
            if(rendition) rendition.prev();
        });
        document.getElementById('btn-next').addEventListener('click', () => {
            if(rendition) rendition.next();
        });

        // Trocar Fonte
        document.getElementById('btn-font-plus').addEventListener('click', () => {
            if(currentFontSize < 250) {
                currentFontSize += 10;
                rendition.themes.fontSize(currentFontSize + "%");
                localStorage.setItem('epub-font-size', currentFontSize);
            }
        });
        document.getElementById('btn-font-minus').addEventListener('click', () => {
            if(currentFontSize > 60) {
                currentFontSize -= 10;
                rendition.themes.fontSize(currentFontSize + "%");
                localStorage.setItem('epub-font-size', currentFontSize);
            }
        });

        // Trocar Tema (Ciclo: Claro -> Sépia -> Escuro -> Claro)
        document.getElementById('btn-theme').addEventListener('click', () => {
            currentThemeIndex++;
            if (currentThemeIndex >= themes.length) {
                currentThemeIndex = 0;
            }
            aplicarTemaAtual();
        });

        function aplicarTemaAtual() {
            const tema = themes[currentThemeIndex];
            rendition.themes.select(tema.id);
            
            // Muda a cor do fundo do HTML por fora do livro para combinar
            document.body.style.backgroundColor = tema.bg;
            document.getElementById('toolbar').style.backgroundColor = tema.id === 'dark' ? '#1a1a1a' : '#f8f8f8';
            document.getElementById('toolbar').style.borderTopColor = tema.id === 'dark' ? '#333' : '#e5e5e5';
            
            localStorage.setItem('epub-theme-index', currentThemeIndex);
        }
    </script>
</body>
</html>
