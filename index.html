<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" id="theme-color-meta" content="#FDF7EC">
    <title>Leitor EPUB PRO VERSAO CORRIGIDA - v7</title>
    
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>

    <div id="library-view">
        <header>
            <h1>Biblioteca <span style="font-size: 12px; background: #ea4335; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle;">v6 Mestre</span></h1>
            <label class="upload-btn" id="upload-label">
                + Adicionar Livro
                <input type="file" id="file-input" accept=".epub" style="display: none;" />
            </label>
        </header>
        <main id="bookshelf"></main>
    </div>

    <div id="reader-view" class="hidden">
        
        <div id="top-bar" class="ui-bar hidden">
            <button id="btn-back" class="icon-btn">‹ Sair</button>
            <div class="top-bar-center">
                <button id="btn-open-toc" class="icon-btn toc-trigger">☰ Capítulos</button>
            </div>
            <div class="top-bar-right">
                <button id="btn-bookmark" class="icon-btn highlight-btn">📍</button>
                <button id="btn-settings" class="icon-btn font-weight-bold" style="font-size: 18px;">Aa</button>
            </div>
        </div>

        <div id="toc-modal" class="hidden">
            <ul id="toc-list"></ul>
        </div>

        <div id="settings-modal" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" data-tab="texto">Texto & Layout</button>
                <button class="tab-btn" data-tab="iluminacao">Iluminação</button>
            </div>
            
            <div id="tab-texto" class="tab-content active">
                <div class="font-carousel">
                    <button class="font-btn" data-font="Original"><div class="circle">A</div><span>Original</span></button>
                    <button class="font-btn" data-font="Helvetica, sans-serif"><div class="circle" style="font-family: Helvetica;">A</div><span>Helvetica</span></button>
                    <button class="font-btn" data-font="Verdana, sans-serif"><div class="circle" style="font-family: Verdana;">A</div><span>Verdana</span></button>
                    <button class="font-btn selected" data-font="'Literata', serif"><div class="circle literata-font">A</div><span>Literata</span></button>
                    <button class="font-btn" data-font="Georgia, serif"><div class="circle" style="font-family: Georgia;">A</div><span>Georgia</span></button>
                </div>
                
                <div class="controls-row" style="margin-top: 20px;">
                    <div class="btn-group">
                        <button id="btn-size-minus">T-</button>
                        <span id="label-size">100%</span>
                        <button id="btn-size-plus">T+</button>
                    </div>
                    <div class="btn-group">
                        <button id="btn-line-minus">↕-</button>
                        <span id="label-line">1.5</span>
                        <button id="btn-line-plus">↕+</button>
                    </div>
                </div>

                <div class="controls-row" style="margin-top: 15px;">
                    <div class="btn-group" style="flex: 1;">
                        <button id="btn-margin-y-minus">↕-</button>
                        <span id="label-margin-y" style="font-size: 11px;">Resp: 60px</span>
                        <button id="btn-margin-y-plus">↕+</button>
                    </div>
                    <select id="select-align" class="full-select" style="flex: 1; margin-left: 10px;">
                        <option value="justify">Justificado</option>
                        <option value="left">Esquerda</option>
                    </select>
                </div>
            </div>

            <div id="tab-iluminacao" class="tab-content">
                <div class="brightness-row">
                    <span style="font-size: 14px;">🔅</span>
                    <input type="range" id="brightness-slider" min="20" max="100" value="100">
                    <span style="font-size: 18px;">🔆</span>
                </div>
                <div class="theme-row">
                    <button class="theme-btn light" data-theme="light"></button>
                    <button class="theme-btn sepia active" data-theme="sepia">✓</button>
                    <button class="theme-btn dark" data-theme="dark"></button>
                </div>
            </div>
        </div>

        <div id="viewer"></div>
        <div id="brightness-overlay"></div>

        <div id="bottom-bar" class="ui-bar hidden">
            <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1">
            <span id="progress-label">Lendo...</span>
        </div>

        <div id="touch-zones">
            <div id="zone-left"></div>
            <div id="zone-center"></div>
            <div id="zone-right"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
